<text x="72" y="96" font-family="Lato" font-weight="900" font-size="44" letter-spacing="6" fill="#211C18">MAKHANIX</text>
<text x="72" y="130" font-family="Lato" font-weight="700" font-size="22" letter-spacing="2" fill="#211C18" opacity="0.65">CRUNCH BETTER. SNACK SMARTER.</text>
<text x="72" y="290" font-family="Lato" font-weight="900" font-size="104" fill="#211C18">4g protein.</text>
<text x="72" y="420" font-family="Lato" font-weight="900" font-size="104" fill="#E8442E">Not 40.</text>
<text x="72" y="500" font-family="Lato" font-weight="700" font-size="34" fill="#211C18">Makhana isn&#8217;t a</text>
<text x="72" y="546" font-family="Lato" font-weight="700" font-size="34" fill="#211C18">protein bomb &#8212; whatever</text>
<text x="72" y="592" font-family="Lato" font-weight="700" font-size="34" fill="#211C18">the other packs say.</text>
<text x="72" y="690" font-family="Lato" font-weight="700" font-size="36" fill="#211C18">It&#8217;s a <tspan font-weight="900" fill="#E8442E">105-calorie, high-fibre</tspan> crunch</text>
<text x="72" y="738" font-family="Lato" font-weight="700" font-size="36" fill="#211C18">that keeps you full till dinner.</text>
<text x="72" y="830" font-family="Lato" font-weight="900" font-size="30" fill="#2E8B57">That&#8217;s the truth. That&#8217;s enough.</text>
