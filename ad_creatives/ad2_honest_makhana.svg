<text x="30" y="198" font-family="Lato" font-weight="700" font-size="26" fill="#211C18">Protein</text><text x="278" y="198" font-family="Lato" font-weight="900" font-size="26" fill="#211C18" text-anchor="end">4g*</text>
<text x="30" y="244" font-family="Lato" font-weight="700" font-size="26" fill="#211C18">Fibre</text><text x="278" y="244" font-family="Lato" font-weight="900" font-size="26" fill="#211C18" text-anchor="end">2g</text>
<text x="30" y="290" font-family="Lato" font-weight="700" font-size="26" fill="#211C18">Fat</text><text x="278" y="290" font-family="Lato" font-weight="900" font-size="26" fill="#211C18" text-anchor="end">1.5g</text>
