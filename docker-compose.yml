x-backend-env: &backend-env
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://crux:crux@db:5432/crux}
  JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  # Aether AI
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
  META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID:-}
  META_PAGE_ID: ${META_PAGE_ID:-}
  META_PIXEL_ID: ${META_PIXEL_ID:-}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
  STRIPE_PRICE_GROWTH: ${STRIPE_PRICE_GROWTH:-}
  STRIPE_PRICE_SCALE: ${STRIPE_PRICE_SCALE:-}
  POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crux}
      POSTGRES_DB: ${POSTGRES_DB:-crux}
    ports:
      - "5432:5432"
    volumes:
      - crux_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crux}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    # Seed the demo data on first boot, then start the API (see backend/start.sh).
    command: sh start.sh

  worker:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
    command: celery -A app.worker worker --loglevel=info --concurrency=2

  beat:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - worker
    environment:
      <<: *backend-env
    command: celery -A app.worker beat --loglevel=info

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"

volumes:
  crux_pgdata:
