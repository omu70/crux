services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crux}
      POSTGRES_DB: ${POSTGRES_DB:-crux}
    ports:
      - "5432:5432"
    volumes:
      - crux_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crux}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://crux:crux@db:5432/crux}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    ports:
      - "8000:8000"
    # Seed the demo data on first boot, then start the API (see backend/start.sh).
    command: sh start.sh

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"

volumes:
  crux_pgdata:
